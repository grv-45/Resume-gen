<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Weather Website</title>
  <link rel="stylesheet" href="index.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
 
  </style>
</head>

<body>
  <nav class="navbar navbar-expand-lg bg-primary navbar-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#">🌦 Mosam?</a>
    </div>
  </nav>

  <main class="container py-5">
    <h1 class="text-center mb-4">Check Weather</h1>

    <!-- Search form -->
    <div class="row justify-content-center">
      <div class="col-md-6">
        <form id="searchForm" class="d-flex mb-4">
          <input id="cityInput" class="form-control me-2" type="text" placeholder="Enter city (e.g. Delhi)" required>
          <button class="btn btn-primary" type="submit">Search</button>
        </form>
      </div>
    </div>

    <!-- Weather card -->
    <div id="weatherResult" class="row justify-content-center mb-5" style="display:none;">
      <div class="col-md-6">
        <div class="weather-card text-center">
          <h2 id="cityName"></h2>
          <img id="weatherIcon" alt="Weather Icon" width="100">
          <h3 id="temperature"></h3>
          <p id="description" class="lead"></p>
          <p><strong>Humidity:</strong> <span id="humidity"></span>%</p>
          <p><strong>Wind Speed:</strong> <span id="wind"></span> m/s</p>
        </div>
      </div>
    </div>

    <!-- History table -->
    <h2 class="text-center mb-3">Previously Searched</h2>
    <div class="table-responsive">
      <table class="table text-center table-bordered">
        <thead class="table-light">
          <tr>
            <th>City</th>
            <th>Temp (°C)</th>
            <th>Condition</th>
            <th>Humidity</th>
            <th>Wind</th>
          </tr>
        </thead>
        <tbody id="historyTable"></tbody>
      </table>
    </div>
  </main>
  <script src="index.js"></script>
</body>

</html>
